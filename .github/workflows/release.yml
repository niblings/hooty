name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary
        run: powershell packaging/build.ps1

      - name: Package archive
        run: Compress-Archive -Path dist\hooty -DestinationPath hooty-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: hooty-windows-x86_64
          path: hooty-windows-x86_64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binary
        run: bash packaging/build.sh

      - name: Package archive
        run: tar czf hooty-linux-x86_64.tar.gz -C dist hooty/

      - uses: actions/upload-artifact@v4
        with:
          name: hooty-linux-x86_64
          path: hooty-linux-x86_64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/hooty-windows-x86_64.zip
            artifacts/hooty-linux-x86_64.tar.gz
          generate_release_notes: true
